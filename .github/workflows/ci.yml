name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-go:
    name: Lint Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - apps/data-plane
          - apps/control-plane
          - apps/async-worker
          - packages/config
          - packages/observability
          - packages/provider-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}

  test-go:
    name: Test Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - apps/data-plane
          - apps/control-plane
          - apps/async-worker
          - packages/config
          - packages/observability
          - packages/provider-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test ./... -race -coverprofile=coverage.out

  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build admin
        run: pnpm build:admin
      - name: Build portal
        run: pnpm build:portal

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-go, test-go, lint-web]
    steps:
      - uses: actions/checkout@v4
      - name: Build data-plane image
        run: docker build -f apps/data-plane/Dockerfile.dev apps/data-plane
      - name: Build control-plane image
        run: docker build -f apps/control-plane/Dockerfile.dev apps/control-plane
      - name: Build async-worker image
        run: docker build -f apps/async-worker/Dockerfile.dev apps/async-worker

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: Verify migrations
        run: |
          if [ -d "db/migrations" ]; then
            goose -dir db/migrations postgres "user=token password=token_dev dbname=token_gateway sslmode=disable" validate
          else
            echo "No migrations directory found. Skipping validation."
          fi
