openapi: 3.1.0
info:
  title: Token Gateway Control Plane API
  version: 0.1.0
  description: Admin and portal API. Requires session authentication (cookie).
servers:
  - url: https://console.lanyu.one
    description: Production
  - url: http://localhost:8081
    description: Local development

paths:
  /admin-api/account-sources:
    get:
      operationId: listAccountSources
      summary: List all account sources
      tags: [Account Sources]
      security:
        - SessionAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20 }
        - name: source_type
          in: query
          schema: { type: string, enum: [official_api_key, official_oauth, upstream_api, subscription_pool] }
      responses:
        '200':
          description: Paginated source list
    post:
      operationId: createAccountSource
      summary: Create a new account source
      tags: [Account Sources]
      security:
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, source_type, credential]
              properties:
                name: { type: string }
                source_type: { type: string }
                provider_id: { type: string }
                credential: { type: string, description: "Plaintext credential — never returned" }
                priority: { type: integer }
                weight: { type: integer }
      responses:
        '201':
          description: Source created (returns fingerprint only)

  /admin-api/account-sources/{id}:
    patch:
      operationId: updateAccountSource
      summary: Update source metadata and limits
      tags: [Account Sources]
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Source updated

  /admin-api/account-sources/{id}/accounts:
    get:
      operationId: listSubscriptionAccounts
      summary: List accounts within a subscription pool
      tags: [Account Sources]
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Account list

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: cookie
      name: session
