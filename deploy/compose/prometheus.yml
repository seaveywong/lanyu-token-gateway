global:
  scrape_interval: 15s
  evaluation_interval: 15s

  # Label merging priority: external_labels < scrape target labels < service-specific labels
  external_labels:
    cluster: "token-gateway"
    environment: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
  # Uncomment and configure Alertmanager when deployed:
  # alertmanagers:
  #   - static_configs:
  #       - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alerting-rules.yml"

scrape_configs:
  - job_name: 'token-gateway'
    metrics_path: '/metrics'
    scheme: 'http'
    static_configs:
      - targets:
          - 'data-plane:8080'
          - 'control-plane:8081'
        labels:
          service: 'token-gateway'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Optional: Postgres exporter (requires postgres-exporter sidecar)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Optional: Redis exporter (requires redis-exporter sidecar)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
